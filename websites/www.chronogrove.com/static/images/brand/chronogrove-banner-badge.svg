<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- White circle shows through the frosted plate; black stroke punches holes for the waveform -->
    <mask id="chronogrove-banner-badge-mask" maskUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="black" />
      <circle cx="50" cy="50" r="41" fill="white" />
      <path
        transform="translate(50, 50) scale(2.08) translate(-16, -16)"
        d="M4 16h8l4 8 4-16 4 8h8"
        fill="none"
        stroke="black"
        stroke-width="2.65"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </mask>
  </defs>
  <rect
    width="100"
    height="100"
    fill="#ffffff"
    opacity="0.74"
    mask="url(#chronogrove-banner-badge-mask)"
  />
</svg>
