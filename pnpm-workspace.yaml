# Shared dependency versions for workspace packages. Use "catalog:" in package.json deps.
catalog:
  '@emotion/cache': ^11.14.0
  '@emotion/react': ^11.14.0
  '@theme-toggles/react': ^4.1.0
  '@mdx-js/react': ^3.1.1
  '@theme-ui/components': ^0.17.4
  '@theme-ui/mdx': ^0.17.4
  boxen: ^8.0.1
  eslint-config-next: ^15.1.0
  # All Gatsby sites and theme tooling resolve this; bump here when upgrading Gatsby.
  gatsby: ^5.16.1
  gatsby-plugin-google-gtag: ^5.16.0
  gatsby-plugin-robots-txt: ^1.8.0
  gatsby-plugin-sitemap: ^6.16.0
  lightgallery: ^2.9.0
  next: ^15.1.0
  prettier: ^3.8.2
  react: ^19.2.5
  react-dom: ^19.2.5
  react-intersection-observer: ^10.0.3
  react-photo-gallery: ^8.0.0
  theme-ui: ^0.17.4
  three: ^0.183.2
