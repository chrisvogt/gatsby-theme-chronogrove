  boxen: ^8.0.1
  gatsby: ^5.16.1
  lightgallery: ^2.9.0
  prettier: 3.8.1
  react: ^19.2.4
  react-dom: ^19.2.4
  react-intersection-observer: ^10.0.2
  react-photo-gallery: ^8.0.0
  theme-ui: ^0.17.4
