name: Deploy www.chronogrove.com to cPanel via SFTP

on:
  push:
    branches: [main]
    paths:
      - 'www.chronogrove.com/**'
      - 'theme/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter www.chronogrove.com build

      - name: Deploy to cPanel via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          port: 22
          user: ${{ secrets.CPANEL_USER }}
          pass: ${{ secrets.CPANEL_PASSWORD }}
          localDir: www.chronogrove.com/public/
          remoteDir: public_html/
